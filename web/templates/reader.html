<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; height: 100vh; }
        
        .sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; overflow-y: auto; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #ddd; }
        .sidebar-header h2 { font-size: 18px; margin-bottom: 10px; }
        .sidebar-header a { color: #4CAF50; text-decoration: none; font-size: 14px; }
        
        .chapter-list { padding: 10px 0; }
        .chapter-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; }
        .chapter-item:hover { background: #f9f9f9; }
        .chapter-item.active { background: #e8f5e9; border-left: 3px solid #4CAF50; }
        .chapter-title { font-size: 14px; color: #333; }
        .chapter-meta { font-size: 12px; color: #888; margin-top: 4px; }
        
        .reader { flex: 1; overflow-y: auto; }
        .reader-header { background: #fff; padding: 20px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        .reader-header h1 { font-size: 24px; }
        .reader-controls { display: flex; gap: 10px; margin-top: 10px; }
        .reader-controls button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; }
        .reader-controls button:hover { background: #f5f5f5; }
        .reader-controls button.active { background: #4CAF50; color: #fff; border-color: #4CAF50; }
        
        .content { padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 18px; color: #333; }
        .content p { margin-bottom: 1em; text-indent: 2em; }
        
        .font-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .font-controls button { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 18px; }
        .font-controls button:hover { background: #f5f5f5; }
        
        .scroll-top { position: fixed; bottom: 80px; right: 20px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 18px; display: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/">← 返回书库</a>
            <h2>章节列表</h2>
        </div>
        <div class="chapter-list" id="chapterList">
            {% for chapter in chapters %}
            <div class="chapter-item" onclick="loadChapter({{ loop.index }})" data-index="{{ loop.index }}">
                <div class="chapter-title">{{ chapter.title }}</div>
                <div class="chapter-meta">{{ chapter.char_count }}字</div>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <div class="reader">
        <div class="reader-header">
            <h1 id="currentTitle">{{ chapters[0].title if chapters else '请选择章节' }}</h1>
            <div class="reader-controls">
                <button onclick="prevChapter()">上一章</button>
                <button onclick="nextChapter()">下一章</button>
                <button onclick="toggleNightMode()" id="nightModeBtn">夜间模式</button>
            </div>
        </div>
        <div class="content" id="content">
            {% if chapters %}
                <p>点击左侧章节开始阅读</p>
            {% else %}
                <p>暂无内容</p>
            {% endif %}
        </div>
    </div>
    
    <div class="font-controls">
        <button onclick="changeFontSize(2)">+</button>
        <button onclick="changeFontSize(-2)">-</button>
    </div>
    
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    
    <script>
        const filePath = '{{ file_path }}';
        const chapters = {{ chapters|tojson }};
        let currentChapter = 0;
        let fontSize = 18;
        
        function loadChapter(index) {
            currentChapter = index;
            const chapter = chapters[index - 1];
            
            // 更新标题
            document.getElementById('currentTitle').textContent = chapter.title;
            
            // 更新章节列表高亮
            document.querySelectorAll('.chapter-item').forEach((item, i) => {
                item.classList.toggle('active', i === index - 1);
            });
            
            // 显示内容（从预加载的数据）
            document.getElementById('content').innerHTML = chapter.content.split('\n').map(p => `<p>${p}</p>`).join('');
        }
        
        function prevChapter() {
            if (currentChapter > 1) {
                loadChapter(currentChapter - 1);
            }
        }
        
        function nextChapter() {
            if (currentChapter < chapters.length) {
                loadChapter(currentChapter + 1);
            }
        }
        
        function changeFontSize(delta) {
            fontSize = Math.max(12, Math.min(24, fontSize + delta));
            document.getElementById('content').style.fontSize = fontSize + 'px';
        }
        
        function toggleNightMode() {
            document.body.classList.toggle('night-mode');
            const btn = document.getElementById('nightModeBtn');
            btn.classList.toggle('active');
        }
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 显示/隐藏回到顶部按钮
        window.addEventListener('scroll', () => {
            document.getElementById('scrollTop').style.display = 
                window.scrollY > 300 ? 'block' : 'none';
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevChapter();
            if (e.key === 'ArrowRight') nextChapter();
        });
        
        // 加载第一章
        if (chapters.length > 0) {
            loadChapter(1);
        }
    </script>
</body>
</html>
