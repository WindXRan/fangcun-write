  <body><h1>简介</h1>
<p>书名：我在风花雪月里等你</p><p>作者：超级大坦克科比</p><p>标签：都市|第一人称|已完结</p><p>简介：</p><p>同名短剧《我在风花雪月里等你》，已上线红果。我们都在假装悲伤，安慰着另一个悲伤的人。直到某天，去到另一座城市，才终于明白：哪有装出来的悲伤，上海也好，大理也罢，城市里灯火通明，孤寂的却只有人心！这是一个逃离都市的失意男人，去大理遭遇情爱的故事。</p>
