name: Deploy Skills to Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - coze
          - openclaw
      skill:
        description: 'Skill to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - fangcun-write
          - fangcun-novel
          - story-analyze
          - story-deslop

env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.list-skills.outputs.skills }}
    steps:
      - uses: actions/checkout@v4
      
      - name: List skills to deploy
        id: list-skills
        run: |
          if [ "${{ github.event.inputs.skill }}" = "all" ]; then
            skills=$(ls -d .agents/skills/fangcun-* .agents/skills/story-* 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            skills=$(echo '["${{ github.event.inputs.skill }}"]')
          fi
          echo "skills=$skills" >> $GITHUB_OUTPUT

  deploy-coze:
    needs: prepare
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'coze'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install requests pyyaml
      
      - name: Deploy to Coze
        env:
          COZE_TOKEN: ${{ secrets.COZE_TOKEN }}
          COZE_SPACE_ID: ${{ secrets.COZE_SPACE_ID }}
        run: |
          for skill in $(echo '${{ needs.prepare.outputs.skills }}' | jq -r '.[]'); do
            echo "Deploying $skill to Coze..."
            python scripts/deploy/deploy_coze.py \
              --skill "$skill" \
              --token "$COZE_TOKEN" \
              --space-id "$COZE_SPACE_ID" \
              || echo "Failed to deploy $skill"
          done

  deploy-openclaw:
    needs: prepare
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'openclaw'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install OpenClaw CLI
        run: npm install -g @openclaw/cli
      
      - name: Login to OpenClaw
        env:
          OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
        run: claw login --token "$OPENCLAW_TOKEN"
      
      - name: Deploy to OpenClaw
        run: |
          for skill in $(echo '${{ needs.prepare.outputs.skills }}' | jq -r '.[]'); do
            echo "Deploying $skill to OpenClaw..."
            claw validate "$skill" && claw publish "$skill" \
              || echo "Failed to deploy $skill"
          done

  notify:
    needs: [deploy-coze, deploy-openclaw]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy-coze.result == 'success' || needs.deploy-openclaw.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Skills deployed successfully\nTag: ${{ github.ref }}\nPlatform: ${{ github.event.inputs.platform }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify failure
        if: needs.deploy-coze.result == 'failure' || needs.deploy-openclaw.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Skills deployment failed\nTag: ${{ github.ref }}\nPlatform: ${{ github.event.inputs.platform }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
