<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄指数</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="番茄小说排行榜趋势分析与数据指数">
</head>
<body>
    <nav class="top-nav" id="top-nav"></nav>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>番茄指数</h1>
                <p class="sidebar-subtitle">女频新书榜追踪</p>
                <p id="update-date" class="update-date">加载中...</p>
            </div>
            <nav class="category-nav">
                <ul id="category-list">
                    <li class="loading-item">加载中...</li>
                </ul>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="main-header">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="菜单">☰</button>
                <div class="header-left">
                    <h2 id="current-category-title">全部分类</h2>
                </div>
                <div class="header-right">
                    <a class="trend-link-btn" href="trend.html">风向标</a>
                    <a class="trend-link-btn author-link-btn" href="author.html">创作灵感</a>
                </div>
            </header>

            <!-- 搜索筛选栏 -->
            <section class="book-toolbar" id="book-toolbar">
                <div class="toolbar-search">
                    <input type="text" id="book-search" class="search-input" placeholder="搜索书名或作者...">
                </div>
                <div class="toolbar-filters">
                    <select id="book-filter" class="filter-select">
                        <option value="all">全部书籍</option>
                        <option value="top10">Top 10</option>
                        <option value="top20">Top 20</option>
                        <option value="ongoing">仅连载中</option>
                        <option value="finished">仅已完结</option>
                    </select>
                    <select id="book-sort" class="filter-select">
                        <option value="rank">按排名</option>
                        <option value="reads">按阅读量</option>
                        <option value="words">按字数</option>
                        <option value="title">按书名</option>
                    </select>
                </div>
            </section>

            <!-- 书籍瀑布流 -->
            <section class="books-waterfall" id="books-waterfall">
                <!-- 书籍卡片由 JS 动态渲染 -->
            </section>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
