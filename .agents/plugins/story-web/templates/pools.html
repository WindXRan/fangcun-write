<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大池子 · 跨分类对比</title>
    <link rel="stylesheet" href="/ranks/css/style.css">
    <style>
        .pool-header { padding: 20px 24px 0; }
        .pool-header h1 { font-size: 22px; margin: 0 0 4px; }
        .pool-header .sub { color: #888; font-size: 13px; }
        .pool-tabs { display: flex; gap: 8px; padding: 12px 24px; border-bottom: 1px solid #2a2a2a; }
        .pool-tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; background: #1e1e1e; border: 1px solid #333; color: #ccc; font-size: 14px; }
        .pool-tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .pool-tab .badge { background: #333; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 5px; }
        .pool-tab.active .badge { background: rgba(255,255,255,.2); }
        .pool-controls { display: flex; gap: 12px; padding: 12px 24px; flex-wrap: wrap; align-items: center; }
        .pool-controls input { padding: 6px 12px; border-radius: 6px; border: 1px solid #333; background: #1e1e1e; color: #eee; font-size: 13px; width: 200px; }
        .pool-controls select { padding: 6px 10px; border-radius: 6px; border: 1px solid #333; background: #1e1e1e; color: #eee; font-size: 13px; }
        .pool-controls .stat { font-size: 13px; color: #888; }
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; padding: 12px 24px 24px; }
        .pool-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; transition: border-color .15s; }
        .pool-card:hover { border-color: #3b82f6; }
        .pool-card .cat-tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 4px; background: #2d2d2d; color: #aaa; margin-bottom: 6px; }
        .pool-card h3 { font-size: 15px; margin: 0 0 4px; color: #eee; }
        .pool-card .author { font-size: 12px; color: #888; margin-bottom: 6px; }
        .pool-card .meta { font-size: 12px; color: #666; display: flex; gap: 12px; }
        .pool-card .intro { font-size: 12px; color: #666; margin-top: 6px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .loading { text-align: center; padding: 60px; color: #888; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="/">书库</a>
        <a href="/ranks/">排行榜</a>
        <a href="/pools/" class="active">大池子</a>
    </nav>

    <div class="pool-header">
        <h1>大池子 · 跨分类对比</h1>
        <div class="sub">一个榜单的所有书合并展示，可跨分类搜索/排序/筛选</div>
    </div>

    <div class="pool-tabs" id="pool-tabs"></div>

    <div class="pool-controls">
        <input type="text" id="search-input" placeholder="搜索书名或作者...">
        <select id="category-filter"><option value="">全部分类</option></select>
        <select id="sort-select">
            <option value="reads">按阅读量</option>
            <option value="title">按书名</option>
            <option value="category">按分类</option>
        </select>
        <span class="stat" id="stat-line"></span>
    </div>

    <div class="pool-grid" id="pool-grid">
        <div class="loading">加载中...</div>
    </div>

    <script>
    const POOL_NAMES = {
        'pool_女频新书.json': '女频新书',
        'pool_女频在读.json': '女频在读',
        'pool_男频新书.json': '男频新书',
    };
    const POOL_FILES = Object.keys(POOL_NAMES);

    let currentPool = null;
    let currentData = null;

    function fmt(n) {
        if (n >= 10000) return (n/10000).toFixed(1) + '万';
        return n.toString();
    }

    function parseReads(s) {
        if (!s) return 0;
        s = s.replace(/,/g, '').trim();
        if (s.includes('万')) return parseFloat(s) * 10000;
        return parseFloat(s) || 0;
    }

    function initTabs() {
        const container = document.getElementById('pool-tabs');
        POOL_FILES.forEach((f, i) => {
            const btn = document.createElement('div');
            btn.className = 'pool-tab' + (i === 0 ? ' active' : '');
            const name = POOL_NAMES[f];
            btn.textContent = name;
            btn.dataset.file = f;
            btn.onclick = () => switchPool(f);
            container.appendChild(btn);
        });
    }

    function switchPool(file) {
        document.querySelectorAll('.pool-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.pool-tab[data-file="${file}"]`).classList.add('active');
        loadPool(file);
    }

    async function loadPool(file) {
        const grid = document.getElementById('pool-grid');
        grid.innerHTML = '<div class="loading">加载中...</div>';

        try {
            const r = await fetch('/pools/data/' + file);
            currentData = await r.json();
            currentPool = file;
            render();
        } catch (e) {
            grid.innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
        }
    }

    function render() {
        if (!currentData) return;

        const books = currentData.books || [];

        // category filter
        const cats = [...new Set(books.map(b => b.category))].sort();
        const sel = document.getElementById('category-filter');
        const curVal = sel.value;
        sel.innerHTML = '<option value="">全部分类</option>';
        cats.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            if (c === curVal) opt.selected = true;
            sel.appendChild(opt);
        });

        // search
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        const catFilter = sel.value;

        let filtered = books.filter(b => {
            if (catFilter && b.category !== catFilter) return false;
            if (q && !b.title.toLowerCase().includes(q) && !(b.author || '').toLowerCase().includes(q)) return false;
            return true;
        });

        // sort
        const sort = document.getElementById('sort-select').value;
        if (sort === 'reads') filtered.sort((a, b) => parseReads(b.reads) - parseReads(a.reads));
        else if (sort === 'title') filtered.sort((a, b) => a.title.localeCompare(b.title, 'zh'));
        else if (sort === 'category') filtered.sort((a, b) => a.category.localeCompare(b.category, 'zh') || parseReads(b.reads) - parseReads(a.reads));

        document.getElementById('stat-line').textContent = `共 ${filtered.length} / ${books.length} 本`;

        const grid = document.getElementById('pool-grid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="loading">无匹配结果</div>';
            return;
        }

        grid.innerHTML = filtered.map(b => `
            <div class="pool-card">
                <span class="cat-tag">${b.category}</span>
                <h3>${b.title}</h3>
                <div class="author">${b.author || '未知'}</div>
                <div class="meta">
                    <span>${b.reads || '?'} 阅读</span>
                    <span>${b.status || ''}</span>
                    <span>${b.word_count || ''}</span>
                </div>
                <div class="intro">${(b.intro || '').slice(0, 200)}</div>
            </div>
        `).join('');
    }

    document.getElementById('search-input').addEventListener('input', render);
    document.getElementById('category-filter').addEventListener('change', render);
    document.getElementById('sort-select').addEventListener('change', render);

    initTabs();
    loadPool(POOL_FILES[0]);
    </script>
</body>
</html>
